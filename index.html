<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DILLI Premium Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Poppins", sans-serif;
      min-height:100vh;
      padding:40px 20px 60px;
      overflow-x:hidden;
      color:#fff;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(168,85,247,0.18), transparent 30%),
        radial-gradient(circle at bottom center, rgba(6,182,212,0.14), transparent 28%),
        linear-gradient(135deg, #030712, #111827, #1e1b4b);
      position:relative;
    }

    .bg-orb{
      position:fixed;
      border-radius:50%;
      filter:blur(90px);
      opacity:0.45;
      z-index:0;
      animation:floatOrb 10s ease-in-out infinite;
      pointer-events:none;
    }

    .orb1{
      width:220px;
      height:220px;
      background:#3b82f6;
      top:40px;
      left:-50px;
    }

    .orb2{
      width:260px;
      height:260px;
      background:#9333ea;
      right:-70px;
      top:180px;
      animation-delay:1.5s;
    }

    .orb3{
      width:240px;
      height:240px;
      background:#06b6d4;
      left:35%;
      bottom:30px;
      animation-delay:3s;
    }

    @keyframes floatOrb{
      0%,100%{
        transform:translateY(0) translateX(0) scale(1);
      }
      50%{
        transform:translateY(-20px) translateX(10px) scale(1.06);
      }
    }

    .gallery-page{
      width:100%;
      max-width:1400px;
      margin:auto;
      position:relative;
      z-index:1;
    }

    .hero-box{
      text-align:center;
      padding:28px 20px 34px;
      margin-bottom:38px;
      border-radius:28px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:
        0 15px 40px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation:fadeUp 1s ease both;
    }

    .gallery-title{
      font-family:"Bruno Ace SC", cursive;
      font-size:clamp(2rem, 5vw, 4rem);
      letter-spacing:2px;
      color:#fff;
      margin-bottom:12px;
      text-shadow:
        0 0 10px rgba(255,255,255,0.18),
        0 0 24px rgba(99,102,241,0.18);
    }

    .gallery-subtitle{
      font-size:clamp(0.95rem, 2vw, 1.15rem);
      color:#dbe7ff;
      max-width:760px;
      margin:auto;
      line-height:1.8;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:40px 30px;
      align-items:start;
    }

    .photo-frame{
      background:linear-gradient(145deg, #f8fafc, #dde5f0);
      padding:16px;
      border-radius:16px;
      box-shadow:
        0 20px 35px rgba(0,0,0,0.28),
        inset 0 2px 12px rgba(255,255,255,0.55);
      transition:transform 0.5s ease, box-shadow 0.5s ease, filter 0.5s ease;
      position:relative;
      overflow:hidden;
      opacity:0;
      transform:translateY(50px);
      animation:fadeUp 0.8s ease forwards;
    }

    .photo-frame::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:16px;
      box-shadow:inset 0 0 18px rgba(0,0,0,0.08);
      pointer-events:none;
    }

    .photo-frame::after{
      content:"";
      position:absolute;
      top:-120%;
      left:-40%;
      width:60%;
      height:220%;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.32),
        transparent
      );
      transform:rotate(20deg);
      transition:0.8s ease;
      pointer-events:none;
    }

    .photo-frame:hover::after{
      left:120%;
    }

    .frame-inner{
      background:linear-gradient(145deg, #d6d6d6, #bfbfbf);
      padding:18px;
      border-radius:10px;
      box-shadow:inset 0 0 22px rgba(0,0,0,0.18);
    }

    .img-box{
      position:relative;
      overflow:hidden;
      border-radius:4px;
    }

    .frame-inner img{
      width:100%;
      aspect-ratio:3/4;
      object-fit:cover;
      display:block;
      border:8px solid #f3f4f6;
      border-radius:4px;
      box-shadow:0 6px 14px rgba(0,0,0,0.18);
      transition:transform 0.45s ease, filter 0.45s ease;
    }

    .frame1{ transform:rotate(-3deg); animation-delay:0.1s; }
    .frame2{ transform:rotate(2deg); animation-delay:0.2s; }
    .frame3{ transform:rotate(-2deg); animation-delay:0.3s; }
    .frame4{ transform:rotate(3deg); animation-delay:0.4s; }
    .frame5{ transform:rotate(-1deg); animation-delay:0.5s; }
    .frame6{ transform:rotate(2deg); animation-delay:0.6s; }
    .frame7{ transform:rotate(-3deg); animation-delay:0.7s; }
    .frame8{ transform:rotate(1deg); animation-delay:0.8s; }
    .frame9{ transform:rotate(-2deg); animation-delay:0.9s; }
    .frame10{ transform:rotate(3deg); animation-delay:1s; }

    .photo-frame:hover{
      transform:translateY(-16px) scale(1.04) rotate(0deg);
      box-shadow:
        0 28px 55px rgba(0,0,0,0.38),
        0 0 30px rgba(99,102,241,0.18);
      z-index:5;
      filter:brightness(1.02);
    }

    .photo-frame:hover img{
      transform:scale(1.04);
      filter:brightness(1.05) saturate(1.08);
    }

    .download-btn{
      position:absolute;
      bottom:16px;
      right:16px;
      width:48px;
      height:48px;
      border:none;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:20px;
      font-weight:700;
      background:rgba(15,23,42,0.75);
      border:1px solid rgba(255,255,255,0.18);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
      opacity:0;
      transform:translateY(16px) scale(0.9);
      transition:0.35s ease;
      z-index:3;
      cursor:pointer;
    }

    .photo-frame:hover .download-btn{
      opacity:1;
      transform:translateY(0) scale(1);
    }

    .download-btn:hover{
      background:linear-gradient(135deg,#3b82f6,#9333ea);
      transform:translateY(0) scale(1.08);
      box-shadow:0 0 18px rgba(147,51,234,0.45);
    }

    .download-btn:active{
      transform:scale(0.96);
    }

    .download-btn.loading{
      opacity:1;
      transform:translateY(0) scale(1);
      background:linear-gradient(135deg,#2563eb,#7c3aed);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(45px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (max-width:768px){
      body{
        padding:28px 16px 50px;
      }

      .hero-box{
        padding:22px 14px 26px;
        margin-bottom:28px;
      }

      .gallery-grid{
        grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
        gap:28px 18px;
      }

      .photo-frame{
        padding:12px;
      }

      .frame-inner{
        padding:12px;
      }

      .frame-inner img{
        border:6px solid #f1f1f1;
      }

      .download-btn{
        width:44px;
        height:44px;
        font-size:18px;
        bottom:12px;
        right:12px;
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    @media (max-width:480px){
      .gallery-grid{
        grid-template-columns:1fr 1fr;
        gap:20px 14px;
      }

      .photo-frame:hover{
        transform:translateY(-8px) scale(1.02) rotate(0deg);
      }

      .gallery-subtitle{
        line-height:1.6;
      }

      .download-btn{
        width:42px;
        height:42px;
        font-size:17px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <section class="gallery-page">
    <div class="hero-box">
      <h1 class="gallery-title">DILLI PREMIUM GALLERY</h1>
      <p class="gallery-subtitle">Beautiful memories in elegant frames with a luxury cinematic presentation</p>
    </div>

    <div class="gallery-grid">

      <div class="photo-frame frame1">
  <div class="frame-inner">
    <div class="img-box">
      <img src="../img/divi.jpeg" alt="Photo 1">
      <button class="download-btn" onclick="downloadCardImage(this, 'divi.jpeg')">⬇</button>

  </div>
</div>

      <div class="photo-frame frame2">

            <button class="download-btn" onclick="downloadImage('../img/img4.jpg','img4.jpg', this)">⬇</button>
          </div>
        </div>
      </div>

      <div class="photo-frame frame5">
        <div class="frame-inner">
          <div class="img-box">

            <button class="download-btn" onclick="downloadImage('../img/img5.jpg','img5.jpg', this)">⬇</button>
          </div>
        </div>
      </div>

      <div class="photo-frame frame6">
        <div class="frame-inner">
          <div class="img-box">
            <img src="../img/img6.jpg" alt="Photo 6">
            <button class="download-btn" onclick="downloadImage('../img/img6.jpg','img6.jpg', this)">⬇</button>
          </div>
        </div>
      </div>

      <div class="photo-frame frame7">
        <div class="frame-inner">
          <div class="img-box">
            <img src="../img/img7.jpg" alt="Photo 7">
            <button class="download-btn" onclick="downloadImage('../img/img7.jpg','img7.jpg', this)">⬇</button>
          </div>

      <div class="photo-frame frame8">

      <div class="photo-frame frame9">
        <div class="frame-inner">
          <div class="img-box">

            <button class="download-btn" onclick="downloadImage('../img/img9.jpg','img9.jpg', this)">⬇</button>

      <div class="photo-frame frame10">
        <div class="frame-inner">
          <div class="img-box">

            <button class="download-btn" onclick="downloadImage('../img/img10.jpg','img10.jpg', this)">⬇</button>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script>
  function downloadCardImage(button, fileName) {
    try {
      const img = button.closest(".img-box").querySelector("img");
      if (!img) {
        alert("Image not found");
        return;
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const image = new Image();
      image.crossOrigin = "anonymous";

      image.onload = function () {
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;

        ctx.drawImage(image, 0, 0);

        canvas.toBlob(function (blob) {
          if (!blob) {
            alert("Download failed");
            return;
          }

          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = blobUrl;
          a.download = fileName || "image.jpg";
          document.body.appendChild(a);
          a.click();
          a.remove();

          setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        }, "image/jpeg");
      };

      image.onerror = function () {
        alert("Image path problem. Check img src path.");
      };

      image.src = img.src;
    } catch (error) {
      alert("Download failed");
      console.error(error);
    }
  }
</script>

</body>
</html>
